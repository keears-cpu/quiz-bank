<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exam Question Bank</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./data.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <p class="eyebrow" id="bank-label">Exam Question Bank</p>
          <h1>시험 생성기</h1>
          <p class="sidebar-copy">기존 시험지를 여러 개 골라 랜덤/균등 분배 세션을 만들고, 풀이와 정답 체크, 인쇄/PDF까지 한 번에 처리합니다.</p>
        </div>
      </div>

      <div class="sidebar-scroll">
        <section class="step-card">
          <div class="step-topline"><span class="step-no">1</span><h2>시험지 선택</h2></div>
          <div class="control-grid">
            <label>카테고리
              <select id="category-filter">
                <option value="">전체</option>
              </select>
            </label>
            <label>시험 종류
              <select id="exam-kind-filter">
                <option value="">전체</option>
              </select>
            </label>
            <label>표면 상태
              <select id="surface-filter">
                <option value="">전체</option>
                <option value="with-image">문항 이미지 있음</option>
                <option value="no-image">문항 이미지 없음</option>
                <option value="manual-review">수동 검수 우선</option>
              </select>
            </label>
            <label>문항 제한
              <select id="question-visibility-filter">
                <option value="all">전체 문항</option>
                <option value="image-only">문항 이미지 있는 것만</option>
              </select>
            </label>
          </div>
          <div id="exam-selection-summary" class="selection-summary">시험지를 여러 개 선택하세요.</div>
          <div class="inline-actions">
            <button id="select-all" type="button">전체 선택</button>
            <button id="clear-all" type="button">선택 해제</button>
          </div>
          <div id="exam-list" class="exam-list"></div>
        </section>

        <section class="step-card">
          <div class="step-topline"><span class="step-no">2</span><h2>세션 구성</h2></div>
          <div class="control-grid">
            <label>문항 수
              <input id="question-count" type="number" min="5" max="80" step="1" value="15">
            </label>
            <label>추출 방식
              <select id="distribution-mode">
                <option value="random">랜덤</option>
                <option value="balanced">시험지 균등 분배</option>
              </select>
            </label>
          </div>
          <div class="inline-actions stacked">
            <button id="load-exams" type="button">선택 시험지 불러오기</button>
            <button id="build-quiz" type="button" class="primary">시험 생성</button>
            <button id="retry-wrong" type="button">오답만 다시 생성</button>
          </div>
          <div id="session-summary" class="status-card">시험지를 선택하고 세션을 생성하세요.</div>
          <div id="operator-warning" class="warning-card" hidden></div>
        </section>

        <section class="step-card">
          <div class="step-topline"><span class="step-no">3</span><h2>풀이/채점</h2></div>
          <div class="inline-actions stacked">
            <button id="grade-quiz" type="button" class="primary subdued">정답 체크</button>
          </div>
          <p class="micro-copy">학생 풀이용은 오른쪽 `Solve` 탭, 문제지 인쇄용은 `Preview` 탭을 사용하세요.</p>
        </section>
      </div>
    </aside>

    <main class="main-panel">
      <div class="topbar">
        <div class="tab-row">
          <button id="show-preview" class="tab-btn active" type="button">Preview</button>
          <button id="show-solve" class="tab-btn" type="button">Solve</button>
        </div>
        <div class="tool-row">
          <div class="toggle-row">
            <button id="column-one" class="chip-btn active" type="button">1열</button>
            <button id="column-two" class="chip-btn" type="button">2열</button>
          </div>
          <div class="toggle-row">
            <label class="toggle-check"><input id="answer-key-toggle" type="checkbox" checked> 정답지 포함</label>
          </div>
          <button id="save-html" class="chip-btn" type="button">HTML 저장</button>
          <button id="print-paper" class="chip-btn primary" type="button">인쇄 / PDF</button>
        </div>
      </div>

      <div class="guide-banner">오른쪽 미리보기는 실제 인쇄용 문제지입니다. 2열 모드와 정답지 포함 여부를 바로 확인할 수 있습니다.</div>

      <section id="preview-view" class="surface-view">
        <div id="quiz-meta" class="quiz-meta"></div>
        <section id="full-exam-preview" class="full-exam-preview" hidden></section>
        <div class="paper-stage">
          <div id="paper-preview" class="paper-preview"></div>
        </div>
      </section>

      <section id="solve-view" class="surface-view hidden">
        <div id="solve-meta" class="quiz-meta"></div>
        <form id="quiz-form" class="quiz-form"></form>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
